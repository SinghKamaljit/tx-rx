<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0A0E1A"/>
  <!-- Outer pulse ring -->
  <circle cx="256" cy="240" r="180" fill="none" stroke="#00D4FF" stroke-width="6" opacity="0.2"/>
  <!-- Mid ring -->
  <circle cx="256" cy="240" r="130" fill="none" stroke="#00D4FF" stroke-width="6" opacity="0.4"/>
  <!-- Inner filled circle -->
  <circle cx="256" cy="240" r="80" fill="rgba(0,212,255,0.08)" stroke="#00D4FF" stroke-width="5"/>
  <!-- Centre dot -->
  <circle cx="256" cy="240" r="28" fill="#00D4FF"/>
  <!-- TX_RX text -->
  <text x="256" y="430" text-anchor="middle" font-family="monospace" font-size="58" font-weight="700" fill="#00D4FF" letter-spacing="8">TX_RX</text>
</svg>
